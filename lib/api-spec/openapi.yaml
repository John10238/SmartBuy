openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Duka POS API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product catalog operations
  - name: orders
    description: Order operations
  - name: transactions
    description: Transaction operations
  - name: mpesa
    description: M-Pesa payment operations
  - name: dashboard
    description: Dashboard summary operations
  - name: storage
    description: Object storage upload and serving endpoints
  - name: auth
    description: Authentication operations
  - name: settings
    description: Business settings operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: A list of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, paid, cancelled, failed]
      responses:
        "200":
          description: A list of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create an order from cart items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /orders/{id}/cancel:
    post:
      operationId: cancelOrder
      tags: [orders]
      summary: Cancel an order and restore stock if it was paid
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}:
    delete:
      operationId: deleteOrder
      tags: [orders]
      summary: Delete an order permanently (restores stock if it was paid)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: An order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List transactions
      responses:
        "200":
          description: A list of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /mpesa/stkpush:
    post:
      operationId: mpesaStkPush
      tags: [mpesa]
      summary: Initiate M-Pesa STK Push
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StkPushInput"
      responses:
        "200":
          description: STK Push initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StkPushResponse"
        "400":
          description: Invalid input or M-Pesa not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Daraja API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /mpesa/callback:
    post:
      operationId: mpesaCallback
      tags: [mpesa]
      summary: M-Pesa STK Push callback (called by Safaricom Daraja)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MpesaCallbackPayload"
      responses:
        "200":
          description: Callback acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MpesaCallbackAck"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out the current session
      responses:
        "204":
          description: Logged out

  /auth/credentials:
    patch:
      operationId: updateCredentials
      tags: [auth]
      summary: Change username and/or password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCredentialsInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated or current password incorrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get business settings
      responses:
        "200":
          description: Business settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update business settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsInput"
      responses:
        "200":
          description: Updated business settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Sales summary for the dashboard
      responses:
        "200":
          description: Sales summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MpesaCallbackPayload:
      type: object
      properties:
        Body:
          type: object
          additionalProperties: true
      required:
        - Body
      additionalProperties: true

    MpesaCallbackAck:
      type: object
      properties:
        ResultCode:
          type: integer
        ResultDesc:
          type: string
      required:
        - ResultCode
        - ResultDesc

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    User:
      type: object
      required: [id, username]
      properties:
        id:
          type: integer
        username:
          type: string

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1

    UpdateCredentialsInput:
      type: object
      required: [currentPassword]
      properties:
        currentPassword:
          type: string
          minLength: 1
        newUsername:
          type: string
          minLength: 3
        newPassword:
          type: string
          minLength: 6

    Settings:
      type: object
      required: [businessName]
      properties:
        businessName:
          type: string
        logoUrl:
          type: ["string", "null"]

    UpdateSettingsInput:
      type: object
      properties:
        businessName:
          type: string
          minLength: 1
        logoUrl:
          type: ["string", "null"]

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `image/jpeg`).

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`). Store this in your database.

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        sku:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        priceCents:
          type: integer
          description: Price in KES cents
        stock:
          type: integer
        category:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - sku
        - description
        - priceCents
        - stock
        - category
        - imageUrl
        - createdAt
        - updatedAt

    CreateProductInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        sku:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        priceCents:
          type: integer
          minimum: 0
        stock:
          type: integer
          minimum: 0
        category:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
      required:
        - name
        - priceCents
        - stock

    UpdateProductInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        sku:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        priceCents:
          type: integer
          minimum: 0
        stock:
          type: integer
          minimum: 0
        category:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        unitPriceCents:
          type: integer
        lineTotalCents:
          type: integer
      required:
        - id
        - orderId
        - productId
        - productName
        - quantity
        - unitPriceCents
        - lineTotalCents

    Order:
      type: object
      properties:
        id:
          type: integer
        reference:
          type: string
        status:
          type: string
          enum: [pending, paid, cancelled, failed]
        totalCents:
          type: integer
        customerPhone:
          type: ["string", "null"]
        customerName:
          type: ["string", "null"]
        cashierName:
          type: ["string", "null"]
        paymentMethod:
          type: string
          enum: [mpesa, cash]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - reference
        - status
        - totalCents
        - customerPhone
        - customerName
        - cashierName
        - paymentMethod
        - items
        - createdAt
        - updatedAt

    CreateOrderItemInput:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
          minimum: 1
      required:
        - productId
        - quantity

    CreateOrderInput:
      type: object
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/CreateOrderItemInput"
        customerPhone:
          type: ["string", "null"]
        customerName:
          type: ["string", "null"]
        cashierName:
          type: ["string", "null"]
        paymentMethod:
          type: string
          enum: [mpesa, cash]
      required:
        - items
        - paymentMethod

    Transaction:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: ["integer", "null"]
        orderReference:
          type: ["string", "null"]
        amountCents:
          type: integer
        provider:
          type: string
          enum: [mpesa, cash]
        status:
          type: string
          enum: [pending, success, failed]
        mpesaCheckoutRequestId:
          type: ["string", "null"]
        mpesaReceiptNumber:
          type: ["string", "null"]
        phoneNumber:
          type: ["string", "null"]
        rawCallback:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - orderId
        - orderReference
        - amountCents
        - provider
        - status
        - mpesaCheckoutRequestId
        - mpesaReceiptNumber
        - phoneNumber
        - rawCallback
        - createdAt

    StkPushInput:
      type: object
      properties:
        orderId:
          type: integer
        phoneNumber:
          type: string
          description: MSISDN in format 2547XXXXXXXX
      required:
        - orderId
        - phoneNumber

    StkPushResponse:
      type: object
      properties:
        merchantRequestId:
          type: ["string", "null"]
        checkoutRequestId:
          type: ["string", "null"]
        responseCode:
          type: ["string", "null"]
        responseDescription:
          type: ["string", "null"]
        customerMessage:
          type: ["string", "null"]
        transactionId:
          type: integer
      required:
        - merchantRequestId
        - checkoutRequestId
        - responseCode
        - responseDescription
        - customerMessage
        - transactionId

    DashboardSummary:
      type: object
      properties:
        totalRevenueCents:
          type: integer
        todayRevenueCents:
          type: integer
        totalOrders:
          type: integer
        paidOrders:
          type: integer
        pendingOrders:
          type: integer
        totalProducts:
          type: integer
        lowStockCount:
          type: integer
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        topProducts:
          type: array
          items:
            $ref: "#/components/schemas/TopProduct"
        salesByDay:
          type: array
          items:
            $ref: "#/components/schemas/SalesByDay"
      required:
        - totalRevenueCents
        - todayRevenueCents
        - totalOrders
        - paidOrders
        - pendingOrders
        - totalProducts
        - lowStockCount
        - recentOrders
        - topProducts
        - salesByDay

    TopProduct:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        unitsSold:
          type: integer
        revenueCents:
          type: integer
      required:
        - productId
        - productName
        - unitsSold
        - revenueCents

    SalesByDay:
      type: object
      properties:
        day:
          type: string
          description: ISO date (YYYY-MM-DD)
        revenueCents:
          type: integer
        orderCount:
          type: integer
      required:
        - day
        - revenueCents
        - orderCount
